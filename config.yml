# Configuration for DRR Analysis

# The default configuration is intentionally self-contained so the repository
# can be reproduced from a clean clone without downloading private data.
system: 'lorenz'
is_multivariate: true

drr_parameters:
  embedding_dim: 3
  tau: 1
  sampling_rate: 100.0

# Data generation/loading parameters
data:
  source: 'generate'
  file_path: 'data/uci_har_processed.csv'
  sampling_rate: 100.0
  duration: 5
  dt: 0.01

# Datasets definition for optional loaders
datasets:
  uci_har:
    path: data/uci_har_processed.csv
    sampling_rate: 50
    columns:
      - body_acc_x
      - body_acc_y
      - body_acc_z
      - body_gyro_x
      - body_gyro_y
      - body_gyro_z
      - acc_magnitude
      - gyro_magnitude
      - acc_gyro_correlation
    description: 'UCI Human Activity Recognition Dataset - Smartphone Sensor Data'

# Analysis modules
analysis:
  methods:
    - resonance_detection
    - phase_space
    - spectral_analysis
    - rooting_analysis
  window_size: 256
  overlap: 0.5
  frequency_range:
    - 0.1
    - 25.0

# Resonance detection parameters
resonance_detection:
  method: 'welch'
  min_frequency: 0.1
  max_frequency: 25.0
  prominence_threshold: 0.1
  persistence_threshold: 0.05

# Phase space reconstruction parameters
phase_space:
  embedding_dimension: 3
  time_delay: 1
  method: 'takens'

# Visualization settings
visualization:
  save_plots: true
  plot_format: 'png'
  dpi: 300
  output_dir: 'results'

# Output settings
output:
  save_results: true
  results_dir: 'results'
  export_format:
    - csv
    - json
